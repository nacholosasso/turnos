<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Barbería</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; color: #ffffff;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0;
        }
        .formulario { 
            background-color: #1e1e1e; padding: 30px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%; max-width: 350px; text-align: center;
        }
        h2 { margin-top: 0; color: #f39c12; }
        label { display: block; text-align: left; margin: 15px 0 5px; font-size: 0.9em; color: #bbb; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            border: 1px solid #333; border-radius: 8px; 
            background-color: #2b2b2b; color: white; box-sizing: border-box;
        }
        input:focus { border-color: #f39c12; outline: none; }
        button { 
            width: 100%; padding: 12px; 
            background-color: #f39c12; color: #121212; 
            border: none; border-radius: 8px; font-weight: bold; font-size: 1em;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        button:hover { background-color: #e67e22; }
        #mensaje { margin-top: 20px; font-weight: bold; min-height: 20px; color: #4caf50;}
    </style>
</head>
<body>

    <div class="formulario">
        <h2>Reservar Turno</h2>
        
        <label for="barbero">Nombre del Barbero:</label>
        <input type="text" id="barbero" placeholder="Ej. Juan">
        
        <label for="fecha">Fecha (DD/MM/AAAA):</label>
        <!-- Usamos text para que coincida con el formato estricto que espera tu código Python -->
        <input type="text" id="fecha" placeholder="Ej. 15/05/2026">
        
        <button onclick="enviarTurno()">Confirmar Turno</button>
        
        <p id="mensaje"></p>
    </div>

    <script>
        async function enviarTurno() {
            // 1. Recogemos los datos que escribió el usuario
            const barbero = document.getElementById('barbero').value;
            const fecha = document.getElementById('fecha').value;
            const mensajeEl = document.getElementById('mensaje');
            
            mensajeEl.innerText = "Enviando...";

            // 2. Preparamos el paquete de datos
            const datos = {
                barbero: barbero,
                fecha: fecha
            };

            // 3. Tu URL de AWS Lambda
            const urlAWS = "https://elujxi76xlncqqtjvqgujk5abm0ewoik.lambda-url.us-east-1.on.aws/";

            try {
                // 4. Hacemos la petición a AWS Lambda
                const respuesta = await fetch(urlAWS, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datos)
                });

                // 5. Leemos la respuesta de tu código Python
                const resultadoText = await respuesta.text();
                
                // 6. Mostramos el resultado en la pantalla
                mensajeEl.innerText = resultadoText;
                
            } catch (error) {
                console.error("Error en la conexión:", error);
                mensajeEl.innerText = "Hubo un error al conectar con el servidor.";
            }
        }
    </script>

</body>
</html>
